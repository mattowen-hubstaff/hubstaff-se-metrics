<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SE Metrics Dashboard — Matt Owen</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <div class="header">
    <div>
      <div class="header-title">// SE_METRICS</div>
      <div class="header-sub">Matt Owen · Support Engineer · Hubstaff</div>
    </div>
    <div class="phase-pill">PHASE 1 — BASELINE</div>
  </div>

  <nav class="tabs">
    <button class="tab-btn active" data-tab="overview">Overview</button>
    <button class="tab-btn" data-tab="silent-app">Silent App</button>
    <button class="tab-btn" data-tab="escalations">Escalations</button>
    <button class="tab-btn" data-tab="insights">Insights</button>
    <button class="tab-btn" data-tab="trends">Trends</button>
    <button class="tab-btn" data-tab="week-log">Week Log</button>
  </nav>

  <main class="main">
    <div id="overview-tab" class="tab-content">
      <div id="overview-content">Loading…</div>
    </div>
    <div id="silent-app-tab" class="tab-content hidden">
      <div id="silent-app-content">Loading…</div>
    </div>
    <div id="escalations-tab" class="tab-content hidden">
      <div id="escalations-content">Loading…</div>
    </div>
    <div id="insights-tab" class="tab-content hidden">
      <div id="insights-content">Loading…</div>
    </div>
    <div id="trends-tab" class="tab-content hidden">
      <div id="trends-content">Loading…</div>
    </div>
    <div id="week-log-tab" class="tab-content hidden">
      <div id="week-log-content">Loading…</div>
    </div>
  </main>

  <div id="toast" class="toast"></div>

  <!-- JS modules in dependency order -->
  <script src="js/config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/overview.js"></script>
  <script src="js/silent-app.js"></script>
  <script src="js/escalations.js"></script>
  <script src="js/insights.js"></script>
  <script src="js/trends.js"></script>
  <script src="js/week-log.js"></script>
  <script src="js/app.js"></script>

  <!-- Footer -->
  <footer class="app-footer">
    <span>SE Metrics Dashboard · Matt Owen · Hubstaff</span>
    <span class="footer-sep">·</span>
    <button class="footer-help-btn" onclick="openHelpModal()">📖 Help Guide</button>
  </footer>

  <!-- Help Modal -->
  <div class="help-overlay hidden" id="help-overlay" onclick="closeHelpModal()">
    <div class="help-modal" onclick="event.stopPropagation()">
      <div class="help-modal-header">
        <span class="help-modal-title">📖 Help Guide</span>
        <button class="help-close-btn" onclick="closeHelpModal()">✕</button>
      </div>
      <div class="help-nav">
        <button class="help-nav-btn active" onclick="showHelpTab('overview')">🏠 Overview</button>
        <button class="help-nav-btn" onclick="showHelpTab('silent-app')">🖥️ Silent App</button>
        <button class="help-nav-btn" onclick="showHelpTab('escalations')">🔺 Escalations</button>
        <button class="help-nav-btn" onclick="showHelpTab('week-log')">📅 Week Log</button>
        <button class="help-nav-btn" onclick="showHelpTab('tips')">💡 Tips</button>
      </div>
      <div class="help-body" id="help-body"></div>
    </div>
  </div>

</body>
</html>
